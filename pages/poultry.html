<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poultry & Livestock | The Part-Timers</title>
<link rel="stylesheet" href="../assets/css/shared.css">
</head><body>
<div class="page-wrapper">
  <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="page-header"><a href="../index.html" class="back-btn">←</a><div><div class="header-title">🐓 Poultry & Livestock</div><div class="header-sub">କୁକୁଡ଼ା ଚାଷ — Animal Husbandry Services</div></div></div>
  <div class="search-bar-section"><div class="search-wrap"><input type="text" id="s" placeholder="Search poultry & livestock... " oninput="render()"><span class="s-icon">🔍</span></div></div>
  <div class="filter-row">
    <div class="chip active" onclick="setC(this,'all')">All</div>
    <div class="chip" onclick="setC(this,'poultry')">🐓 Poultry</div>
    <div class="chip" onclick="setC(this,'goat')">🐐 Goat</div>
    <div class="chip" onclick="setC(this,'cow')">🐄 Cow/Buffalo</div>
    <div class="chip" onclick="setC(this,'vet')">💉 Vet Help</div>
  </div>
  <div id="list" style="background:#f8f9fa;padding-top:8px"></div>
  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">Home<br>ଘର</div></a>
    <a href="search.html" class="nav-item"><div class="nav-icon">🔍</div><div class="nav-label">Search<br>ଖୋଜନ୍ତୁ</div></a>
    <a href="orders.html" class="nav-item"><div class="nav-icon">📋</div><div class="nav-label">My Orders<br>ମୋ ଅର୍ଡର</div></a>
    <a href="#" class="nav-item"><div class="nav-icon">💬</div><div class="nav-label">Chat<br>ଚାଟ୍</div></a>
    <a href="profile.html" class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Profile<br>ପ୍ରୋଫାଇଲ</div></a>
  </nav>
</div>
<div id="toast" class="toast"></div>
<script src="../assets/js/data.js"></script>
<script>
const D=[
  {id:'p1',emoji:'🐓',name:'Anita Mohanty',village:'Puri',subcat:'Poultry Farm Worker',price:250,unit:'day',rating:4.4,reviews:41,trust:78,badge:'Local',odia:'ମୁର୍ଗୀ ଚାଷ ଅଭିଜ୍ଞ।',k:'poultry'},
  {id:'p2',emoji:'🐐',name:'Durga Nayak',village:'Cuttack',subcat:'Goat Herder',price:200,unit:'day',rating:4.3,reviews:29,trust:75,badge:'Local',odia:'ବକ୍ରା ଚରାଇବା ଅଭିଜ୍ଞ।',k:'goat'},
  {id:'p3',emoji:'🐄',name:'Basanta Sahu',village:'Kendrapara',subcat:'Dairy Farm Worker',price:280,unit:'day',rating:4.5,reviews:63,trust:82,badge:'Trusted',odia:'ଗୋ ଦୁଗ୍ଧ ଚାଷ ଅଭିଜ୍ଞ।',k:'cow'},
  {id:'p4',emoji:'💉',name:'Dr. Ajit Pradhan',village:'Bhubaneswar',subcat:'Veterinary Assistant',price:400,unit:'visit',rating:4.8,reviews:112,trust:93,badge:'Certified',odia:'ପଶୁ ଡାକ୍ତର ସହାୟକ।',k:'vet poultry goat cow'},
];
let ac='all';
function setC(el,c){ac=c;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const q=document.getElementById('s').value.toLowerCase();
  const data=D.filter(d=>(!q||(d.name+d.village+d.k).toLowerCase().includes(q))&&(ac==='all'||d.k.includes(ac)));
  document.getElementById('list').innerHTML=data.map(d=>`<div class="provider-card">
    <div class="pc-image">${d.emoji}<div class="pc-badge">${d.badge}</div><div class="pc-verified">✅ ${d.trust}%</div></div>
    <div class="pc-body">
      <div class="pc-name">${d.name}</div><div class="pc-loc">📍 ${d.village} • ${d.subcat}</div>
      <div class="bilingual">${d.odia}</div>
      <div class="pc-meta" style="margin-top:10px"><div class="pc-rating">⭐${d.rating} (${d.reviews})</div><div class="pc-price">₹${d.price}/${d.unit}</div></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-primary" style="flex:1;padding:10px;font-size:13px" onclick="location.href='booking.html?id=${d.id}'">📅 Book Now</button>
        <button style="padding:10px 14px;border:2px solid #4CAF50;border-radius:12px;background:white;color:#4CAF50;cursor:pointer" onclick="showToast('📞 Calling...')">📞</button>
      </div>
    </div></div>`).join('')||`<div class="empty-state"><div class="emoji">🐓</div><h3>No workers found</h3></div>`;
}
render();
</script></body></html>
