<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farming Work — The Part-Timers</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>

<div class="page-hero" data-emoji="🌾">
  <button class="ph-back" onclick="history.back()">←</button>
  <div class="ph-title">🌾 Farming Work</div>
  <div class="ph-sub">Find skilled farm workers near your village</div>
  <div class="ph-odia">ଚାଷ କାମ — ଆଖ. ଗ.</div>
</div>

<div class="chips-row" id="filterRow">
  <button class="chip active" onclick="filterSub(this,'')">All</button>
  <button class="chip" onclick="filterSub(this,'Tractor Operator')">🚜 Tractor</button>
  <button class="chip" onclick="filterSub(this,'Farm Labourer')">🌾 Labour</button>
  <button class="chip" onclick="filterSub(this,'Irrigation')">💧 Irrigation</button>
  <button class="chip" onclick="filterSub(this,'Harvester')">⚙️ Harvester</button>
</div>

<div style="padding:10px 16px 0;display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-bottom:1px solid var(--border)">
  <span id="resultCount" style="font-size:13px;color:var(--text-muted)">Loading...</span>
  <select id="sortSel" class="form-control" style="width:140px;padding:7px 10px;font-size:12px" onchange="renderWorkers()">
    <option value="">Best Match</option>
    <option value="rating">⭐ Rating</option>
    <option value="price_asc">💰 Price Low</option>
    <option value="price_desc">💰 Price High</option>
  </select>
</div>

<div class="cards-grid" id="workerGrid"></div>

<div id="emptyState" style="display:none" class="empty-state">
  <div class="es-icon">🌾</div>
  <div class="es-title">No workers found</div>
  <div class="es-sub">Try different filters or search all of Odisha</div>
  <a href="../search.html?cat=farming" class="btn btn-primary" style="display:inline-flex;margin-top:12px">Search All Farming</a>
</div>

<nav class="bottom-nav">
  <div class="bn-items">
    <a class="bn-item" href="../../index.html"><div class="bn-icon">🏠</div><div class="bn-label">Home<br>ଘର</div></a>
    <a class="bn-item" href="../search.html"><div class="bn-icon">🔍</div><div class="bn-label">Search<br>ଖୋଜ</div></a>
    <a class="bn-item" href="../food/index.html"><div class="bn-icon">🍽️</div><div class="bn-label">Food<br>ଖାଦ୍ୟ</div></a>
    <a class="bn-item" href="../user/orders.html"><div class="bn-icon">📋</div><div class="bn-label">Orders<br>ଅ.</div></a>
    <a class="bn-item" href="../user/profile.html"><div class="bn-icon">👤</div><div class="bn-label">Profile<br>ପ.</div></a>
  </div>
</nav>
<div id="toast"></div>
<script src="../../data/config.js"></script>
<script src="../../data/data.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
const CAT_ID = 'farming';
let subFilter = '';

function filterSub(el, sub) {
  subFilter = sub;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderWorkers();
}

function renderWorkers() {
  const D = window.PT_DATA;
  if (!D) return;
  const sort = document.getElementById('sortSel').value;
  let workers = D.workers.filter(w => w.category === CAT_ID);
  if (subFilter) workers = workers.filter(w => w.subcat && w.subcat.toLowerCase().includes(subFilter.toLowerCase()));

  if (sort === 'rating') workers.sort((a,b) => b.rating - a.rating);
  else if (sort === 'price_asc') workers.sort((a,b) => a.price - b.price);
  else if (sort === 'price_desc') workers.sort((a,b) => b.price - a.price);

  document.getElementById('resultCount').textContent = workers.length + ' providers found';

  if (!workers.length) {
    document.getElementById('workerGrid').innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('workerGrid').innerHTML = workers.map(w => `
    <div class="worker-card" onclick="location.href='../user/worker-profile.html?id=${w.id}'">
      <div class="wc-head">
        <div class="wc-avatar">
          <span style="font-size:26px">${w.emoji}</span>
          ${w.verified ? '<div class="wc-verified">✓</div>' : ''}
        </div>
        <div class="wc-info">
          <div class="wc-name">${w.name}</div>
          <div class="wc-sub">${w.subcat} • 📍 ${w.village}</div>
          ${w.odia ? `<div class="wc-odia">${w.odia}</div>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:17px;font-weight:700;color:var(--accent)">₹${w.price}</div>
          <div style="font-size:11px;color:var(--text-light)">/${w.unit}</div>
        </div>
      </div>
      <div class="wc-meta">
        <span class="tag">⭐ ${w.rating} (${w.reviews})</span>
        ${w.badge ? `<span class="tag tag-orange">${w.badge}</span>` : ''}
        <span class="tag tag-blue">📡 ${w.radius}km</span>
        ${w.verified ? '<span class="tag" style="background:#E8F5E9;color:var(--primary)">✓ Verified</span>' : ''}
      </div>
      <div class="trust-bar">
        <div class="trust-label"><span>Trust Score</span><span>${w.trust}%</span></div>
        <div class="trust-track"><div class="trust-fill" style="width:${w.trust}%"></div></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary btn-sm" style="flex:1" onclick="event.stopPropagation();location.href='../user/booking.html?id=${w.id}'">📅 Book</button>
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();callWorker('${w.phone}','${w.name}')">📞</button>
      </div>
    </div>`).join('');
}

renderWorkers();
</script>
</body>
</html>
