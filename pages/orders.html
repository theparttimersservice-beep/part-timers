<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders | The Part-Timers</title>
<link rel="stylesheet" href="../assets/css/shared.css">
<style>
.order-card{background:white;border-radius:14px;margin:0 16px 12px;box-shadow:0 2px 8px rgba(0,0,0,0.07);overflow:hidden;border:1px solid #eee}
.oc-header{display:flex;align-items:center;padding:14px;gap:12px;border-bottom:1px solid #f5f5f5}
.oc-avatar{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#E8F5E8,#C8E6C9);display:flex;align-items:center;justify-content:center;font-size:24px}
.oc-info{flex:1}
.oc-name{font-size:14px;font-weight:700;color:#1a1a1a}
.oc-sub{font-size:12px;color:#666;margin-top:2px}
.oc-status{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.status-confirmed{background:#E8F5E8;color:#2E7D32}
.status-pending{background:#FFF3E0;color:#E65100}
.status-completed{background:#E3F2FD;color:#1565C0}
.status-cancelled{background:#FFEBEE;color:#C62828}
.oc-body{padding:12px 14px}
.oc-detail{display:flex;justify-content:space-between;font-size:13px;color:#333;margin-bottom:6px}
.oc-actions{display:flex;gap:8px;margin-top:10px}
.oc-btn{flex:1;padding:9px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
.oc-btn-track{background:#E8F5E8;color:#2E7D32}
.oc-btn-cancel{background:#FFEBEE;color:#C62828}
.oc-btn-rate{background:linear-gradient(135deg,#FFC107,#FFD740);color:#333}
.empty-orders{text-align:center;padding:60px 30px}
</style>
</head><body>
<div class="page-wrapper">
  <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="page-header"><a href="../index.html" class="back-btn">←</a><div><div class="header-title">📋 My Orders</div><div class="header-sub">ମ. ब. — Bookings & Service History</div></div></div>

  <div class="filter-row">
    <div class="chip active" onclick="setTab(this,'all')">All</div>
    <div class="chip" onclick="setTab(this,'pending')">⏳ Pending</div>
    <div class="chip" onclick="setTab(this,'confirmed')">✅ Confirmed</div>
    <div class="chip" onclick="setTab(this,'completed')">🏁 Completed</div>
    <div class="chip" onclick="setTab(this,'cancelled')">❌ Cancelled</div>
  </div>

  <div id="orderList" style="background:#f8f9fa;padding:12px 0"></div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">Home<br>ଘର</div></a>
    <a href="search.html" class="nav-item"><div class="nav-icon">🔍</div><div class="nav-label">Search<br>ଖୋଜନ୍ତୁ</div></a>
    <a href="orders.html" class="nav-item active"><div class="nav-icon">📋</div><div class="nav-label">My Orders<br>ମୋ ଅର୍ଡର</div></a>
    <a href="#" class="nav-item"><div class="nav-icon">💬</div><div class="nav-label">Chat<br>ଚାଟ୍</div></a>
    <a href="profile.html" class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Profile<br>ପ୍ରୋଫାଇଲ</div></a>
  </nav>
</div>
<div id="toast" class="toast"></div>
<script src="../assets/js/data.js"></script>
<script>
const ORDERS=[
  {id:'ord1',emoji:'🚜',name:'Rabindra Nayak',service:'Tractor Plowing',date:'2025-07-20',time:'10:00 AM',status:'confirmed',price:1680,village:'Kendrapara'},
  {id:'ord2',emoji:'⚡',name:'Priya Das',service:'Electrical Wiring',date:'2025-07-18',time:'9:00 AM',status:'completed',price:400,village:'Bhubaneswar'},
  {id:'ord3',emoji:'🍛',name:'Amma Kitchen',service:'Dalma Thali x3',date:'2025-07-19',time:'12:30 PM',status:'pending',price:240,village:'Kendrapara'},
  {id:'ord4',emoji:'📚',name:'Kavita Nanda',service:'Math Tuition (Jul)',date:'2025-07-01',time:'Monthly',status:'completed',price:500,village:'Bhubaneswar'},
  {id:'ord5',emoji:'🔧',name:'Manoj Patel',service:'Pipe Fitting',date:'2025-07-15',time:'11:00 AM',status:'cancelled',price:350,village:'Cuttack'},
];
let activeTab='all';
function setTab(el,tab){activeTab=tab;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const data=ORDERS.filter(o=>activeTab==='all'||o.status===activeTab);
  if(!data.length){
    document.getElementById('orderList').innerHTML=`<div class="empty-orders"><div style="font-size:52px;margin-bottom:14px">📋</div><h3 style="font-size:17px;color:#333;font-weight:600;margin-bottom:6px">No orders yet</h3><p style="color:#999;font-size:13px">Your bookings will appear here</p><button class="btn-primary" style="margin-top:20px;padding:12px 24px;width:auto" onclick="location.href='search.html'">Find Services</button></div>`;
    return;
  }
  document.getElementById('orderList').innerHTML=data.map(o=>`<div class="order-card">
    <div class="oc-header">
      <div class="oc-avatar">${o.emoji}</div>
      <div class="oc-info">
        <div class="oc-name">${o.name}</div>
        <div class="oc-sub">📍 ${o.village} • ${o.service}</div>
      </div>
      <div class="oc-status status-${o.status}">${{confirmed:'✅ Confirmed',pending:'⏳ Pending',completed:'🏁 Done',cancelled:'❌ Cancelled'}[o.status]}</div>
    </div>
    <div class="oc-body">
      <div class="oc-detail"><span>📅 Date</span><span>${o.date} • ${o.time}</span></div>
      <div class="oc-detail"><span>💰 Amount</span><span style="color:#FF5722;font-weight:700">₹${o.price}</span></div>
      <div class="oc-detail"><span>🆔 Order ID</span><span style="font-size:11px;color:#999">#PT-${o.id.toUpperCase()}</span></div>
      <div class="oc-actions">
        ${o.status==='confirmed'?`<button class="oc-btn oc-btn-track" onclick="showToast('📍 Tracking provider...')">📍 Track</button><button class="oc-btn oc-btn-cancel" onclick="showToast('❌ Cancellation requested')">Cancel</button>`:''}
        ${o.status==='completed'?`<button class="oc-btn oc-btn-rate" onclick="showToast('⭐ Rating submitted! Thank you')">⭐ Rate Service</button><button class="oc-btn oc-btn-track" onclick="location.href='booking.html'">🔄 Rebook</button>`:''}
        ${o.status==='pending'?`<button class="oc-btn oc-btn-track" onclick="showToast('📞 Calling provider...')">📞 Contact</button><button class="oc-btn oc-btn-cancel" onclick="showToast('❌ Order cancelled')">Cancel</button>`:''}
        ${o.status==='cancelled'?`<button class="oc-btn oc-btn-track" onclick="location.href='booking.html'">🔄 Rebook</button>`:''}
      </div>
    </div></div>`).join('');
}
render();
</script></body></html>
