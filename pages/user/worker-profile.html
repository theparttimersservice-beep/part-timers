<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Profile — The Part-Timers</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .wp-hero {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      padding: 20px 20px 28px;
      color: white;
      position: relative;
    }
    .wp-back { background: rgba(255,255,255,0.15); border: none; color: white; width: 38px; height: 38px; border-radius: 12px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
    .wp-top { display: flex; gap: 18px; align-items: flex-start; }
    .wp-avatar { width: 80px; height: 80px; border-radius: 22px; background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 40px; flex-shrink: 0; }
    .wp-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .wp-subcat { font-size: 14px; opacity: 0.85; margin-bottom: 6px; }
    .wp-loc { font-size: 13px; opacity: 0.75; }
    .wp-badges { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px; }
    .wp-badge { background: rgba(255,255,255,0.2); color: white; padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .wp-stats { display: flex; gap: 24px; margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.2); }
    .wps-item { text-align: center; }
    .wps-num { font-size: 22px; font-weight: 800; }
    .wps-lbl { font-size: 11px; opacity: 0.75; margin-top: 2px; }
    .section-card { background: var(--surface); margin: 10px 0 0; padding: 20px; }
    .section-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .info-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border-light); font-size: 14px; }
    .info-row:last-child { border: none; }
    .info-key { color: var(--text-muted); font-weight: 500; }
    .info-val { font-weight: 600; color: var(--text); text-align: right; }
    .trust-section { background: var(--bg-2); border-radius: var(--radius); padding: 16px; }
    .review-item { padding: 14px 0; border-bottom: 1px solid var(--border-light); }
    .review-item:last-child { border: none; }
    .ri-head { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .ri-name { font-size: 13px; font-weight: 600; }
    .ri-date { font-size: 11px; color: var(--text-light); }
    .ri-text { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .sticky-book {
      position: sticky;
      bottom: 0;
      background: var(--surface);
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }
    .sb-price { font-size: 22px; font-weight: 800; color: var(--accent); }
    .sb-unit  { font-size: 12px; color: var(--text-muted); }
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
  </style>
</head>
<body>

<div id="workerHero">
  <!-- Dynamic content -->
</div>

<div id="workerBody">
  <!-- Dynamic content -->
</div>

<div class="sticky-book" id="stickyBook">
  <div>
    <div class="sb-price" id="sbPrice">₹0</div>
    <div class="sb-unit" id="sbUnit">per hour</div>
  </div>
  <button class="btn btn-outline btn-sm" onclick="callThis()">📞 Call</button>
  <button class="btn btn-primary" style="flex:1" onclick="bookThis()">📅 Book Now</button>
</div>

<div id="toast"></div>

<script src="../../data/config.js"></script>
<script src="../../data/data.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
const wid = getParam('id');
let W = null;

function load() {
  if (!wid || !window.PT_DATA) {
    document.getElementById('workerHero').innerHTML = '<div style="padding:60px 20px;text-align:center"><div style="font-size:60px">😕</div><h3 style="margin-top:16px">Worker not found</h3><a href="../search.html" class="btn btn-primary" style="display:inline-flex;margin-top:16px">Search Services</a></div>';
    document.getElementById('stickyBook').style.display = 'none';
    return;
  }

  W = PT_DATA.workers.find(w => w.id === wid);
  if (!W) { load(); W = null; return; }

  // Hero
  document.title = W.name + ' — The Part-Timers';
  document.getElementById('workerHero').innerHTML = `
    <div class="wp-hero">
      <button class="wp-back" onclick="history.back()">←</button>
      <div class="wp-top">
        <div class="wp-avatar">${W.emoji}</div>
        <div>
          <div class="wp-name">${W.name}</div>
          <div class="wp-subcat">${W.subcat}</div>
          <div class="wp-loc">📍 ${W.village}, ${W.district}</div>
          ${W.odia ? `<div class="wp-loc" style="font-family:var(--font-odia)">${W.odia}</div>` : ''}
        </div>
      </div>
      <div class="wp-badges">
        ${W.verified ? '<span class="wp-badge">✓ Verified</span>' : '<span class="wp-badge" style="background:rgba(255,255,255,0.12)">📋 Unverified</span>'}
        ${W.badge ? `<span class="wp-badge">${W.badge}</span>` : ''}
        <span class="wp-badge">📡 ${W.radius}km radius</span>
        <span class="wp-badge">📞 Phone Verified</span>
      </div>
      <div class="wp-stats">
        <div class="wps-item"><div class="wps-num">⭐ ${W.rating}</div><div class="wps-lbl">Rating</div></div>
        <div class="wps-item"><div class="wps-num">${W.reviews}</div><div class="wps-lbl">Reviews</div></div>
        <div class="wps-item"><div class="wps-num">${W.trust}%</div><div class="wps-lbl">Trust Score</div></div>
      </div>
    </div>`;

  // Price for sticky
  document.getElementById('sbPrice').textContent = '₹' + W.price;
  document.getElementById('sbUnit').textContent = 'per ' + W.unit;

  // Body
  const baseReviews = (PT_DATA.reviews || []).filter(r => r.worker === W.id);
  const localRatings = JSON.parse(localStorage.getItem('pt_ratings') || '[]').filter(r => r.workerName === W.name && r.ratingBy === 'customer');
  const reviews = [...baseReviews, ...localRatings.map(r => ({ user: 'Customer', rating: r.rating, text: (r.tags||[]).join(', ') + (r.text ? '. ' + r.text : ''), date: r.createdAt?.split('T')[0] || 'Recently' }))];

  document.getElementById('workerBody').innerHTML = `
    <div class="section-card">
      <h3>📋 About <span style="font-family:var(--font-odia);font-size:12px;font-weight:400;color:var(--text-muted)">ବିବ.</span></h3>
      <p style="font-size:14px;color:var(--text-muted);line-height:1.6">${W.desc}</p>
      <div style="margin-top:14px">
        <div class="tags-wrap">
          ${(W.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>

    <div class="section-card">
      <h3>ℹ️ Details</h3>
      <div class="info-row"><span class="info-key">Category</span><span class="info-val">${W.subcat}</span></div>
      <div class="info-row"><span class="info-key">Village</span><span class="info-val">📍 ${W.village}</span></div>
      <div class="info-row"><span class="info-key">District</span><span class="info-val">${W.district}</span></div>
      <div class="info-row"><span class="info-key">Price</span><span class="info-val" style="color:var(--accent)">₹${W.price} / ${W.unit}</span></div>
      <div class="info-row"><span class="info-key">Service Radius</span><span class="info-val">${W.radius} km</span></div>
      <div class="info-row"><span class="info-key">Verified</span><span class="info-val">${W.verified ? '✅ Yes' : '❌ Not yet'}</span></div>
    </div>

    <div class="section-card">
      <h3>🛡️ Trust Score</h3>
      <div class="trust-section">
        <div style="font-size:28px;font-weight:800;color:var(--primary);margin-bottom:10px">${W.trust}%</div>
        <div class="trust-track"><div class="trust-fill" style="width:${W.trust}%"></div></div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:8px">Based on reviews, verification & village references</div>
      </div>
    </div>

    <div class="section-card">
      <h3>⭐ Reviews (${reviews.length || W.reviews})</h3>
      ${reviews.length ? reviews.map(r => `
        <div class="review-item">
          <div class="ri-head">
            <div class="ri-name">👤 ${r.user}</div>
            <div style="display:flex;gap:8px;align-items:center">
              <span class="stars">${'⭐'.repeat(r.rating)}</span>
              <span class="ri-date">${r.date}</span>
            </div>
          </div>
          <div class="ri-text">${r.text}</div>
        </div>`).join('') : `
        <div style="text-align:center;padding:30px 20px;color:var(--text-muted)">
          <div style="font-size:36px;margin-bottom:8px">📝</div>
          <div style="font-size:14px">No reviews yet. Be the first!</div>
        </div>`}
    </div>

    <div class="section-card">
      <h3>📍 Location</h3>
      <div id="workerMap" style="height:200px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)"></div>
      <div style="text-align:center;margin-top:12px">
        <button class="btn btn-outline btn-sm" onclick="PT_MAPS.init('workerMap')">Load Map</button>
      </div>
    </div>

    <div style="height:90px"></div>`;
}

function bookThis() {
  if (!W) return;
  location.href = `booking.html?id=${W.id}`;
}

function callThis() {
  if (!W) return;
  if (W.phone && !W.phone.includes('X')) window.open('tel:' + W.phone);
  else showToast('📞 Contact via WhatsApp below');
}

load();
</script>
</body>
</html>
