<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy / Sell Marketplace — The Part-Timers</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .mp-hero { background: linear-gradient(135deg, #4527A0, #6A1B9A, #8E24AA); padding: 22px 20px 28px; color: white; position: relative; overflow: hidden; }
    .mp-hero::after { content:'🛒'; position:absolute; right:-5px; bottom:-15px; font-size:130px; opacity:0.08; }
    .mp-card { background: var(--surface); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-xs); border: 1px solid var(--border); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .mp-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .mpc-thumb { height: 130px; display: flex; align-items: center; justify-content: center; font-size: 56px; background: linear-gradient(135deg, var(--bg), var(--bg-2)); position: relative; }
    .mpc-cat  { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); color: white; font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
    .mpc-body { padding: 12px 14px; }
    .mpc-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .mpc-loc   { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .mpc-price { font-size: 18px; font-weight: 800; color: var(--accent); }
    .post-ad-btn { position: fixed; bottom: calc(var(--bottom-h) + 16px); right: 20px; background: linear-gradient(135deg, #4527A0, #6A1B9A); color: white; border: none; padding: 14px 20px; border-radius: var(--radius-full); font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 24px rgba(69,39,160,0.4); z-index: 100; display: flex; align-items: center; gap: 8px; }
  </style>
</head>
<body>

<div class="mp-hero">
  <button style="background:rgba(255,255,255,0.15);border:none;color:white;width:38px;height:38px;border-radius:12px;font-size:20px;cursor:pointer;margin-bottom:14px" onclick="history.back()">←</button>
  <div style="font-size:24px;font-weight:800;margin-bottom:4px">🛒 Buy / Sell</div>
  <div style="font-size:13px;opacity:0.85">Village marketplace • କ. ବ.</div>
</div>

<div style="padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)">
  <input type="text" id="mpSearch" class="form-control" placeholder="🔍 Search items to buy or sell..." oninput="renderMP()">
</div>

<div class="cat-filters" style="display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:var(--surface);border-bottom:1px solid var(--border)" id="mpFilters">
  <button class="chip active" onclick="setMPCat(this,'')">All</button>
  <button class="chip" onclick="setMPCat(this,'vehicles')">🏍️ Vehicles</button>
  <button class="chip" onclick="setMPCat(this,'electronics')">📱 Electronics</button>
  <button class="chip" onclick="setMPCat(this,'land')">🌾 Land</button>
  <button class="chip" onclick="setMPCat(this,'animals')">🐐 Animals</button>
  <button class="chip" onclick="setMPCat(this,'tools')">🔧 Tools</button>
  <button class="chip" onclick="setMPCat(this,'crops')">🌾 Crops</button>
  <button class="chip" onclick="setMPCat(this,'furniture')">🪑 Furniture</button>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 16px 100px" id="mpGrid"></div>

<button class="post-ad-btn" onclick="showPostAdModal()">+ Post Ad</button>

<!-- Post Ad Modal -->
<div class="modal-overlay" id="postAdModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div style="font-size:17px;font-weight:700;margin-bottom:18px">📢 Post Your Ad</div>
    <div class="form-group">
      <label class="form-label">📦 Item Title</label>
      <input type="text" id="adTitle" class="form-control" placeholder="e.g. Honda Shine 2019">
    </div>
    <div class="form-group">
      <label class="form-label">📂 Category</label>
      <select id="adCat" class="form-control">
        <option value="vehicles">🏍️ Vehicles</option>
        <option value="electronics">📱 Electronics</option>
        <option value="land">🌾 Land</option>
        <option value="animals">🐐 Animals</option>
        <option value="tools">🔧 Tools</option>
        <option value="crops">🌾 Crops</option>
        <option value="furniture">🪑 Furniture</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">💰 Price (₹)</label>
      <input type="number" id="adPrice" class="form-control" placeholder="0">
    </div>
    <div class="form-group">
      <label class="form-label">📍 Village</label>
      <input type="text" id="adVillage" class="form-control" placeholder="Your village">
    </div>
    <div class="form-group">
      <label class="form-label">📝 Description</label>
      <textarea id="adDesc" class="form-control" placeholder="Describe your item..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">📞 Your Phone</label>
      <input type="tel" id="adPhone" class="form-control" placeholder="10-digit" maxlength="10">
    </div>
    <button class="btn btn-primary btn-full btn-lg" onclick="submitAd()">📢 Post Ad — FREE</button>
  </div>
</div>

<nav class="bottom-nav">
  <div class="bn-items">
    <a class="bn-item" href="../../index.html"><div class="bn-icon">🏠</div><div class="bn-label">Home<br>ଘର</div></a>
    <a class="bn-item" href="../search.html"><div class="bn-icon">🔍</div><div class="bn-label">Search<br>ଖୋଜ</div></a>
    <a class="bn-item" href="../food/index.html"><div class="bn-icon">🍽️</div><div class="bn-label">Food<br>ଖାଦ୍ୟ</div></a>
    <a class="bn-item" href="../user/orders.html"><div class="bn-icon">📋</div><div class="bn-label">Orders<br>ଅ.</div></a>
    <a class="bn-item" href="../user/profile.html"><div class="bn-icon">👤</div><div class="bn-label">Profile<br>ପ.</div></a>
  </div>
</nav>
<div id="toast"></div>
<script src="../../data/config.js"></script>
<script src="../../data/data.js"></script>
<script src="../../assets/js/app.js"></script>
<script>
let mpCat = '';
const emojis = { vehicles:'🏍️', electronics:'📱', land:'🌾', animals:'🐐', tools:'🔧', crops:'🌾', furniture:'🪑' };

function setMPCat(el, cat) {
  mpCat = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderMP();
}

function renderMP() {
  const D = window.PT_DATA;
  if (!D) return;
  const q = document.getElementById('mpSearch').value.toLowerCase();
  let items = [...D.marketplace, ...getLocalAds()];
  if (mpCat) items = items.filter(m => m.category === mpCat);
  if (q) items = items.filter(m => [m.title, m.desc, m.village, m.category].join(' ').toLowerCase().includes(q));
  document.getElementById('mpGrid').innerHTML = items.map(m => `
    <div class="mp-card" onclick="showToast('📞 Contact seller for: ${m.title}')">
      <div class="mpc-thumb">
        ${m.emoji || emojis[m.category] || '📦'}
        <span class="mpc-cat">${m.category}</span>
      </div>
      <div class="mpc-body">
        <div class="mpc-title">${m.title}</div>
        <div class="mpc-loc">📍 ${m.village}</div>
        <div class="mpc-price">₹${Number(m.price).toLocaleString('en-IN')}</div>
      </div>
    </div>`).join('');
}

function getLocalAds() {
  try { return JSON.parse(localStorage.getItem('pt_ads') || '[]'); }
  catch(e) { return []; }
}

function showPostAdModal() { document.getElementById('postAdModal').classList.add('open'); }
function closeModal() { document.getElementById('postAdModal').classList.remove('open'); }

function submitAd() {
  const title   = document.getElementById('adTitle').value.trim();
  const cat     = document.getElementById('adCat').value;
  const price   = document.getElementById('adPrice').value;
  const village = document.getElementById('adVillage').value.trim();
  const desc    = document.getElementById('adDesc').value.trim();
  const phone   = document.getElementById('adPhone').value.trim();

  if (!title)  return showToast('⚠️ Enter item title');
  if (!price)  return showToast('⚠️ Enter price');
  if (!village) return showToast('⚠️ Enter your village');
  if (!validatePhone(phone)) return showToast('⚠️ Enter valid phone');

  const ad = { id:'ad'+Date.now(), title, category:cat, price:+price, village, desc, phone, emoji: emojis[cat]||'📦', _local:true };
  const ads = getLocalAds();
  ads.push(ad);
  localStorage.setItem('pt_ads', JSON.stringify(ads));
  SHEETS_API.post('postAd', ad);
  closeModal();
  renderMP();
  showToast('✅ Ad posted successfully!');
}

renderMP();
</script>
</body>
</html>
