<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish & Aqua Work | The Part-Timers</title>
<link rel="stylesheet" href="../assets/css/shared.css">
</head><body>
<div class="page-wrapper">
  <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="page-header"><a href="../index.html" class="back-btn">←</a><div><div class="header-title">🐟 Fish & Aqua Work</div><div class="header-sub">ମାଛ ଚାଷ — Fisheries & Aquaculture Services</div></div></div>
  <div class="search-bar-section"><div class="search-wrap"><input type="text" id="s" placeholder="Search fish work... | ମାଛ ଚାଷ ଖୋଜ" oninput="render()"><span class="s-icon">🔍</span></div></div>
  <div class="filter-row">
    <div class="chip active" onclick="setC(this,'all')">All</div>
    <div class="chip" onclick="setC(this,'pond')">🐟 Pond Mgmt</div>
    <div class="chip" onclick="setC(this,'harvest')">🪣 Harvest</div>
    <div class="chip" onclick="setC(this,'prawn')">🦐 Prawn Farm</div>
  </div>
  <div id="list" style="background:#f8f9fa;padding-top:8px"></div>
  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">Home<br>ଘର</div></a>
    <a href="search.html" class="nav-item"><div class="nav-icon">🔍</div><div class="nav-label">Search<br>ଖୋଜନ୍ତୁ</div></a>
    <a href="orders.html" class="nav-item"><div class="nav-icon">📋</div><div class="nav-label">My Orders<br>ମୋ ଅର୍ଡର</div></a>
    <a href="#" class="nav-item"><div class="nav-icon">💬</div><div class="nav-label">Chat<br>ଚାଟ୍</div></a>
    <a href="profile.html" class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Profile<br>ପ୍ରୋଫାଇଲ</div></a>
  </nav>
</div>
<div id="toast" class="toast"></div>
<script src="../assets/js/data.js"></script>
<script>
const D=[
  {id:'fi1',emoji:'🐟',name:'Suresh Sahoo',village:'Jagatsinghpur',subcat:'Pond Management',price:280,unit:'day',rating:4.5,reviews:64,trust:80,badge:'Local',odia:'ପୋଖରୀ ପ୍ରବନ୍ଧ ଅଭିଜ୍ଞ।',k:'pond harvest'},
  {id:'fi2',emoji:'🦐',name:'Nilima Panda',village:'Kendrapara',subcat:'Prawn Farm Worker',price:320,unit:'day',rating:4.6,reviews:48,trust:82,badge:'Verified',odia:'ଚିଙ୍ଗୁଡ଼ି ଚାଷ ଅଭିଜ୍ଞ।',k:'prawn'},
  {id:'fi3',emoji:'🎣',name:'Santosh Behera',village:'Paradeep',subcat:'Fish Harvest Expert',price:250,unit:'day',rating:4.4,reviews:89,trust:77,badge:'Local',odia:'ମାଛ ଧରିବା ଅଭିଜ୍ଞ।',k:'harvest'},
  {id:'fi4',emoji:'🐠',name:'Bijay Mahanty',village:'Aul',subcat:'Aquaculture Tech',price:500,unit:'day',rating:4.8,reviews:32,trust:90,badge:'Specialist',odia:'ଜଳଜ ଚାଷ ବିଶେଷଜ୍ଞ।',k:'pond prawn'},
];
let ac='all';
function setC(el,c){ac=c;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const q=document.getElementById('s').value.toLowerCase();
  const data=D.filter(d=>(!q||(d.name+d.village+d.subcat+d.k).toLowerCase().includes(q))&&(ac==='all'||d.k.includes(ac)));
  document.getElementById('list').innerHTML=data.map(d=>`<div class="provider-card">
    <div class="pc-image">${d.emoji}<div class="pc-badge">${d.badge}</div><div class="pc-verified">✅ ${d.trust}%</div></div>
    <div class="pc-body">
      <div class="pc-name">${d.name}</div><div class="pc-loc">📍 ${d.village} • ${d.subcat}</div>
      <div class="bilingual">${d.odia}</div>
      <div class="pc-meta" style="margin-top:10px"><div class="pc-rating">⭐${d.rating} (${d.reviews})</div><div class="pc-price">₹${d.price}/${d.unit}</div></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-primary" style="flex:1;padding:10px;font-size:13px" onclick="location.href='booking.html?id=${d.id}'">📅 Book Now</button>
        <button style="padding:10px 14px;border:2px solid #4CAF50;border-radius:12px;background:white;color:#4CAF50;cursor:pointer" onclick="showToast('📞 Calling...')">📞</button>
      </div>
    </div></div>`).join('')||`<div class="empty-state"><div class="emoji">🐟</div><h3>No workers found</h3></div>`;
}
render();
</script></body></html>
