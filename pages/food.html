<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Delivery | The Part-Timers</title>
<link rel="stylesheet" href="../assets/css/shared.css">
<style>
.food-tab-bar{display:flex;background:white;border-bottom:2px solid #eee}
.food-tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:600;color:#999;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s}
.food-tab.active{color:#4CAF50;border-bottom-color:#4CAF50}
.vendor-card{background:white;border-radius:16px;margin:0 20px 16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);overflow:hidden;border:1px solid #eee}
.vendor-header{display:flex;align-items:center;padding:14px;gap:12px}
.vendor-avatar{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,#E8F5E8,#C8E6C9);display:flex;align-items:center;justify-content:center;font-size:26px}
.vendor-info{flex:1}
.vendor-name{font-size:16px;font-weight:700;color:#1a1a1a}
.vendor-loc{font-size:12px;color:#666;margin-top:2px}
.vendor-badge{display:inline-block;background:#E8F5E8;color:#2E7D32;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-top:4px}
.product-list{padding:0 14px 14px}
.product-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid #f5f5f5}
.product-name{font-size:14px;font-weight:600;color:#1a1a1a}
.product-desc{font-size:12px;color:#666;margin-top:2px;line-height:1.3;max-width:210px}
.product-right{text-align:right;flex-shrink:0}
.product-price{font-size:15px;font-weight:700;color:#FF5722}
.add-btn{margin-top:4px;padding:5px 14px;background:linear-gradient(135deg,#4CAF50,#66BB6A);color:white;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer}
.vendor-images{display:flex;gap:6px;padding:0 14px 12px;overflow-x:auto;scrollbar-width:none}
.vendor-images::-webkit-scrollbar{display:none}
.vi{width:60px;height:60px;border-radius:10px;background:linear-gradient(135deg,#f0f0f0,#e0e0e0);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.cart-bar{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:440px;background:linear-gradient(135deg,#FF5722,#FF7043);color:white;border-radius:14px;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 6px 20px rgba(255,87,34,0.3);z-index:200;display:none}
.cart-bar.show{display:flex}
</style>
</head><body>
<div class="page-wrapper">
  <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="page-header"><a href="../index.html" class="back-btn">←</a><div><div class="header-title">🍽️ Food Delivery</div><div class="header-sub">ଖାଦ୍ୟ ଡେଲିଭରୀ — Fresh Veggies, Instant Food, Grocery</div></div></div>
  <div class="search-bar-section"><div class="search-wrap"><input type="text" id="s" placeholder="Search food, vegetables, grocery..." oninput="render()"><span class="s-icon">🔍</span></div></div>

  <!-- Tab Bar -->
  <div class="food-tab-bar">
    <div class="food-tab active" onclick="setTab(this,'vegetables')">🥦 Fresh Vegetables<br><span style="font-size:10px;color:inherit">ପନିପରିବା</span></div>
    <div class="food-tab" onclick="setTab(this,'instant')">🍛 Instant Food<br><span style="font-size:10px;color:inherit">ତୁରନ୍ତ ଖାଦ୍ୟ</span></div>
    <div class="food-tab" onclick="setTab(this,'grocery')">🛒 Grocery<br><span style="font-size:10px;color:inherit">ଗ୍ରୋସରୀ</span></div>
  </div>

  <div id="list" style="background:#f8f9fa;padding-top:12px;padding-bottom:16px"></div>

  <!-- Cart Bar -->
  <div class="cart-bar" id="cartBar">
    <div><div style="font-weight:700">🛒 <span id="cartCount">0</span> items</div><div style="font-size:12px;opacity:0.9">₹<span id="cartTotal">0</span></div></div>
    <button onclick="location.href='checkout.html'" style="background:white;color:#FF5722;border:none;border-radius:20px;padding:8px 20px;font-weight:700;cursor:pointer">Checkout →</button>
  </div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">Home<br>ଘର</div></a>
    <a href="search.html" class="nav-item"><div class="nav-icon">🔍</div><div class="nav-label">Search<br>ଖୋଜନ୍ତୁ</div></a>
    <a href="orders.html" class="nav-item"><div class="nav-icon">📋</div><div class="nav-label">My Orders<br>ମୋ ଅର୍ଡର</div></a>
    <a href="#" class="nav-item"><div class="nav-icon">💬</div><div class="nav-label">Chat<br>ଚାଟ୍</div></a>
    <a href="profile.html" class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Profile<br>ପ୍ରୋଫାଇଲ</div></a>
  </nav>
</div>
<div id="toast" class="toast"></div>
<script src="../assets/js/data.js"></script>
<script>
let activeTab='vegetables';
let cart=[];

const FOOD_DATA=[
  {id:'v1',name:'Green Harvest Vegetables',village:'Aul',category:'vegetables',emoji:'🥦',badge:'Farm Fresh',rating:4.9,reviews:312,
   odia:'ଜମିରୁ ସିଧା ତଜା ପନିପରିବା।',
   images:['🥦','🍅','🌽','🥕'],
   desc:'Farm-fresh vegetables delivered from fields every morning. No chemicals, no preservatives.',
   products:[
    {name:'Tomato 1kg',price:30,desc:'Naturally grown, fresh red tomatoes'},
    {name:'Potato 5kg',price:90,desc:'Premium quality potatoes from local farms'},
    {name:'Seasonal Mix Box',price:120,desc:'Mixed seasonal vegetables — 3kg variety box with 6 types'},
    {name:'Brinjal 1kg',price:25,desc:'Fresh purple brinjal, tender and clean'}
   ]},
  {id:'v2',name:'Morning Dew Organic Farm',village:'Cuttack',category:'vegetables',emoji:'🌽',badge:'Organic',rating:4.6,reviews:89,
   odia:'ଜୈବ ପ୍ରମାଣିତ ପନିପରିବା।',
   images:['🥬','🌶️','🫑','🥒'],
   desc:'NPOP certified organic farm. Pesticide-free vegetables grown with cow-dung compost.',
   products:[
    {name:'Organic Spinach Bundle',price:25,desc:'Fresh organic spinach, free from pesticides'},
    {name:'Organic Brinjal 1kg',price:35,desc:'Certified pesticide-free brinjal'},
    {name:'Organic Combo Box 5kg',price:200,desc:'5 types of organic vegetables, 1kg each'}
   ]},
  {id:'f1',name:'Amma Kitchen',village:'Kendrapara',category:'instant',emoji:'🍛',badge:'Popular',rating:4.8,reviews:234,
   odia:'ଖାଁଟି ଓଡ଼ିଆ ଘର ଖାଦ୍ୟ।',
   images:['🍛','🐟','🥘','🫓'],
   desc:'Authentic Odia home-cooked food. Prepared fresh daily with local ingredients.',
   products:[
    {name:'Dalma Thali',price:80,desc:'Traditional Odia dalma with steamed rice, pickle and papad'},
    {name:'Fish Curry Thali',price:120,desc:'Fresh fish curry with rice, dal and seasonal vegetable'},
    {name:'Pakhala Bhata Set',price:40,desc:'Fermented rice with curd, roasted fish and fried items'}
   ]},
  {id:'f2',name:'Maa Tarini Kitchen',village:'Puri',category:'instant',emoji:'🥘',badge:'Homemade',rating:4.7,reviews:178,
   odia:'ଧାର୍ମିକ ରୋଷଘର — ସୁସ୍ୱାଦୁ ଖାଦ୍ୟ।',
   images:['🥘','🍲','🫕','🍜'],
   desc:'Pure veg meals, special Jagannath prasad-style cooking. Khichdi, sabji, roti available.',
   products:[
    {name:'Khichdi Thali',price:60,desc:'Moong dal khichdi with ghee, sabji and pappad'},
    {name:'Roti + Sabji Set',price:50,desc:'4 rotis with 2 seasonal sabji and dal'},
    {name:'Special Puri Thali',price:90,desc:'6 puris with aloo curry, chutney and sweet'}
   ]},
  {id:'g1',name:'Jagannath Grocery Store',village:'Puri',category:'grocery',emoji:'🛒',badge:'Trusted',rating:4.7,reviews:178,
   odia:'ସମ୍ପୂର୍ଣ ଗ୍ରୋସରୀ ଭଣ୍ଡାର।',
   images:['🛒','🌾','🫙','🧴'],
   desc:'Complete grocery delivery — rice, dal, oil, spices, flour and daily essentials to your village.',
   products:[
    {name:'Sona Masoori Rice 10kg',price:480,desc:'Premium quality Sona Masoori rice, clean and aromatic'},
    {name:'Mustard Oil 1L',price:170,desc:'Pure cold-pressed mustard oil'},
    {name:'Dal Combo Pack',price:220,desc:'Toor dal, Moong dal, Chana dal — 1kg each'},
    {name:'Atta 5kg',price:190,desc:'Whole wheat flour, soft and fresh'}
   ]},
  {id:'g2',name:'Village Kirana Bhandar',village:'Kendrapara',category:'grocery',emoji:'🏪',badge:'Local',rating:4.5,reviews:132,
   odia:'ଗ୍ରାମ ଭ. — ଦୈନ. ଆ.',
   images:['🧂','🫙','🥫','🍬'],
   desc:'All daily household needs — salt, sugar, spices, biscuits, soap, and more. Fast doorstep delivery.',
   products:[
    {name:'Spice Combo Box',price:150,desc:'Turmeric, chilli, coriander, cumin — 100g each'},
    {name:'Soap & Shampoo Kit',price:120,desc:'Bathing soap x4 and sachets shampoo pack'},
    {name:'Monthly Essential Box',price:800,desc:'20 daily items packed for one household month'}
   ]}
];

function setTab(el,tab){
  activeTab=tab;
  document.querySelectorAll('.food-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function addToCart(productName, price) {
  cart.push({name:productName,price});
  const total=cart.reduce((s,i)=>s+i.price,0);
  document.getElementById('cartCount').textContent=cart.length;
  document.getElementById('cartTotal').textContent=total;
  document.getElementById('cartBar').classList.add('show');
  showToast(`✅ Added: ${productName}`);
}

function render(){
  const q=document.getElementById('s').value.toLowerCase();
  const data=FOOD_DATA.filter(d=>d.category===activeTab&&(!q||(d.name+d.village+d.desc).toLowerCase().includes(q)));
  document.getElementById('list').innerHTML=data.map(d=>`
    <div class="vendor-card">
      <div class="vendor-header">
        <div class="vendor-avatar">${d.emoji}</div>
        <div class="vendor-info">
          <div class="vendor-name">${d.name}</div>
          <div class="vendor-loc">📍 ${d.village}</div>
          <div class="vendor-badge">⭐ ${d.rating} (${d.reviews}) • ${d.badge}</div>
        </div>
      </div>
      <div class="vendor-images">${d.images.map(i=>`<div class="vi">${i}</div>`).join('')}</div>
      <div style="padding:0 14px 10px;font-size:13px;color:#555;line-height:1.4">${d.desc}<br><span style="font-size:11px;color:#999;font-style:italic">${d.odia}</span></div>
      <div class="product-list">
        ${d.products.map(p=>`<div class="product-item">
          <div><div class="product-name">${p.name}</div><div class="product-desc">${p.desc}</div></div>
          <div class="product-right"><div class="product-price">₹${p.price}</div>
          <button class="add-btn" onclick="addToCart('${p.name}',${p.price})">+ Add</button></div>
        </div>`).join('')}
      </div>
    </div>`).join('')||`<div class="empty-state"><div class="emoji">🍽️</div><h3>No vendors found</h3><p>Try another category</p></div>`;
}
render();
</script></body></html>
