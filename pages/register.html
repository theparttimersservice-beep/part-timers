<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | The Part-Timers</title>
<link rel="stylesheet" href="../assets/css/shared.css">
<style>
.reg-tabs{display:flex;background:white;border-bottom:2px solid #eee;overflow-x:auto;scrollbar-width:none}
.reg-tabs::-webkit-scrollbar{display:none}
.reg-tab{padding:12px 16px;font-size:12px;font-weight:600;color:#999;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent}
.reg-tab.active{color:#4CAF50;border-bottom-color:#4CAF50}
.form-section{background:white;border-radius:14px;margin:12px 16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.form-section-title{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #eee}
.upload-box{border:2px dashed #ddd;border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:border-color 0.2s}
.upload-box:hover{border-color:#4CAF50}
.upload-box .icon{font-size:36px;margin-bottom:8px}
.upload-box p{font-size:13px;color:#666}
.terms-box{background:#f8f9fa;border-radius:10px;padding:12px;font-size:12px;color:#555;line-height:1.5;max-height:120px;overflow-y:auto;margin-bottom:10px}
.checkbox-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:14px}
.checkbox-row input{width:18px;height:18px;margin-top:1px;flex-shrink:0;cursor:pointer}
.checkbox-row label{font-size:13px;color:#333;line-height:1.4;cursor:pointer}
</style>
</head><body>
<div class="page-wrapper">
  <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="page-header"><a href="../index.html" class="back-btn">←</a><div><div class="header-title">📝 Register</div><div class="header-sub">ପଞ୍ଜୀକରଣ — Join The Part-Timers Platform</div></div></div>

  <div class="reg-tabs">
    <div class="reg-tab active" onclick="setTab(this,'worker')">👷 Worker</div>
    <div class="reg-tab" onclick="setTab(this,'vendor')">🛒 Vendor</div>
    <div class="reg-tab" onclick="setTab(this,'teacher')">📚 Teacher</div>
    <div class="reg-tab" onclick="setTab(this,'technician')">🔧 Technician</div>
    <div class="reg-tab" onclick="setTab(this,'contractor')">🏗️ Contractor</div>
  </div>

  <div id="formContent"></div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">Home<br>ଘର</div></a>
    <a href="search.html" class="nav-item"><div class="nav-icon">🔍</div><div class="nav-label">Search<br>ଖୋଜନ୍ତୁ</div></a>
    <a href="orders.html" class="nav-item"><div class="nav-icon">📋</div><div class="nav-label">My Orders<br>ମୋ ଅର୍ଡର</div></a>
    <a href="#" class="nav-item"><div class="nav-icon">💬</div><div class="nav-label">Chat<br>ଚାଟ୍</div></a>
    <a href="profile.html" class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Profile<br>ପ୍ରୋଫାଇଲ</div></a>
  </nav>
</div>
<div id="toast" class="toast"></div>
<script src="../assets/js/data.js"></script>
<script>
const CATEGORIES={
  worker:{icon:'👷',title:'Worker Registration',odia:'ଶ୍ରମିକ ପଞ୍ଜୀ',cats:['🌾 Farm Labourer','🚜 Tractor Operator','🐟 Fish Farm Worker','🐓 Poultry Worker','🏗️ General Labour']},
  vendor:{icon:'🛒',title:'Vendor Registration',odia:'ବ. ପ.',cats:['🥦 Vegetable Seller','🍛 Food/Tiffin Vendor','🛒 Grocery Shop','🍯 Organic Products']},
  teacher:{icon:'📚',title:'Teacher Registration',odia:'ଶ. ପ.',cats:['📖 Academic Tutor','🎵 Music Teacher','💃 Dance Teacher','🎨 Art Teacher','🔧 Skill Trainer']},
  technician:{icon:'🔧',title:'Technician Registration',odia:'ଟ. ପ.',cats:['⚡ Electrician','🔧 Plumber','❄️ AC/Fridge Repair','📱 Mobile Repair','⚙️ Motor Repair']},
  contractor:{icon:'🏗️',title:'Contractor Registration',odia:'ଠ. ପ.',cats:['🏠 House Construction','🎨 Painting','🪨 Tiles/Flooring','🔩 Carpentry','🏗️ Civil Work']}
};

function setTab(el,type){
  document.querySelectorAll('.reg-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderForm(type);
}

function renderForm(type){
  const c=CATEGORIES[type];
  document.getElementById('formContent').innerHTML=`
  <div class="form-section">
    <div class="form-section-title">${c.icon} ${c.title} • ${c.odia}</div>
    <div class="form-group"><label class="form-label">Full Name <span class="odia">• ସ. ନ.</span></label><input type="text" class="form-input" placeholder="Enter your full name"></div>
    <div class="form-group"><label class="form-label">Mobile Number <span class="odia">• ମ. ন.</span></label><input type="tel" class="form-input" placeholder="+91 XXXXXXXXXX"></div>
    <div class="form-group"><label class="form-label">Village / Town <span class="odia">• ଗ. / ସ.</span></label><input type="text" class="form-input" placeholder="Village name, block, district"></div>
    <div class="form-group"><label class="form-label">Category <span class="odia">• ব.</span></label>
      <select class="form-select">${c.cats.map(cat=>`<option>${cat}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label class="form-label">Experience <span class="odia">• ა.</span></label>
      <select class="form-select"><option>Less than 1 year</option><option>1-3 years</option><option>3-5 years</option><option>5-10 years</option><option>10+ years</option></select>
    </div>
    <div class="form-group"><label class="form-label">Your Price/Rate <span class="odia">• ম.</span></label>
      <div style="display:flex;gap:8px">
        <input type="number" class="form-input" placeholder="Amount (₹)" style="flex:2">
        <select class="form-select" style="flex:1"><option>per day</option><option>per hour</option><option>per visit</option><option>per month</option><option>per km</option></select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Service Radius <span class="odia">• স.</span></label>
      <select class="form-select"><option>Up to 5 km</option><option>Up to 10 km</option><option>Up to 20 km</option><option>Anywhere in District</option></select>
    </div>
    <div class="form-group"><label class="form-label">About Yourself <span class="odia">• আ.</span></label>
      <textarea class="form-textarea" placeholder="Describe your skills and experience (max 300 characters)" maxlength="300"></textarea>
    </div>
    <div class="form-group"><label class="form-label">Reference 1 (Village Elder/Employer)</label>
      <input type="text" class="form-input" placeholder="Name + Phone number">
    </div>
    <div class="form-group"><label class="form-label">Reference 2</label>
      <input type="text" class="form-input" placeholder="Name + Phone number">
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">📸 Upload Photo</div>
    <div class="upload-box" onclick="showToast('📸 Camera/gallery would open here')">
      <div class="icon">📷</div>
      <p>Tap to upload your photo<br><span style="font-size:11px;color:#999">ଫ. ଅ. ।</span></p>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">⚖️ Terms & Conditions • ନ. ଓ শ.</div>
    <div class="terms-box">
      <strong>Platform Rules:</strong><br>
      1. All information provided must be accurate and truthful.<br>
      2. Workers must honor bookings once confirmed.<br>
      3. Any fraudulent activity will result in account suspension.<br>
      4. The Part-Timers reserves the right to verify all details.<br>
      5. Pricing must be transparent and as listed on profile.<br><br>
      <strong>Legal Notice:</strong><br>
      If any user violates platform rules, provides false information, commits fraud, or behaves illegally, The Part-Timers team reserves the right to suspend accounts or take action according to applicable law (IT Act 2000, Consumer Protection Act 2019).<br><br>
      <em>ଯଦି କୌଣସି ଉପଭୋକ୍ତା ପ୍ଲାଟଫର୍ମ ନିୟମ ଉଲ୍ଲଂଘନ, ମିଥ୍ୟା ସୂଚନା, ଠକ ଦେବା ବା ଅବୈଧ ଆଚରଣ କରିଲେ, ଦ ପାର୍ଟ-ଟାଇମର୍ସ ଦଳ ଖାତା ସ୍ଥଗିତ ବା ଆଇନ ଅନୁଯାୟୀ ପଦକ୍ଷେପ ନେବାର ଅଧିକାର ରଖୁଛି।</em>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="terms">
      <label for="terms">I have read and agree to the Terms & Conditions and Legal Notice above.<br><span style="font-size:11px;color:#999">ମୁଁ ଉପରୋକ୍ତ ନ. ও ق. ର ସ. |\</span></label>
    </div>
    <button class="btn-primary" onclick="submitForm()">✅ Submit Registration • ପ. ਦ.</button>
    <div style="margin-top:10px;padding:10px;background:#FFF8E1;border-radius:10px;font-size:12px;color:#5D4037">
      ⚠️ By submitting, you confirm all information is correct. False information may lead to legal action.
    </div>
  </div>`;
}

function submitForm(){
  if(!document.getElementById('terms').checked){showToast('⚠️ Please accept Terms & Conditions');return;}
  showToast('✅ Registration submitted! We will verify within 24 hours.');
  setTimeout(()=>{if(confirm('Registration submitted! Go to Home?'))location.href='../index.html';},1500);
}

renderForm('worker');
</script></body></html>
