<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Part-Timers</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(160deg, #1B5E20 0%, #2E7D32 40%, #388E3C 70%, #4CAF50 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }
    .bg-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.06;
      font-size: 80px;
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      padding: 20px;
      pointer-events: none;
      overflow: hidden;
    }
    .logo-wrap {
      text-align: center;
      animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }
    @keyframes popIn {
      0%   { opacity:0; transform: scale(0.5); }
      100% { opacity:1; transform: scale(1); }
    }
    .logo-icon {
      width: 110px; height: 110px;
      background: rgba(255,255,255,0.2);
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 60px;
      margin: 0 auto 20px;
      border: 3px solid rgba(255,255,255,0.35);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .logo-name {
      font-size: 32px; font-weight: 900;
      color: white;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .logo-tagline {
      font-size: 15px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 6px;
    }
    .logo-odia {
      font-size: 16px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 30px;
    }
    .stats-row {
      display: flex; gap: 28px;
      margin-bottom: 50px;
      animation: fadeUp 0.6s 0.4s forwards; opacity: 0;
    }
    @keyframes fadeUp {
      0%   { opacity:0; transform: translateY(20px); }
      100% { opacity:1; transform: translateY(0); }
    }
    .stat { text-align: center; }
    .stat-n { font-size: 22px; font-weight: 800; color: white; }
    .stat-l { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }
    .progress-bar {
      width: 200px; height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
      overflow: hidden;
      animation: fadeUp 0.4s 0.3s forwards; opacity: 0;
    }
    .progress-fill {
      height: 100%;
      background: rgba(255,255,255,0.9);
      border-radius: 2px;
      animation: fillBar 2.2s 0.5s ease-out forwards;
      width: 0%;
    }
    @keyframes fillBar {
      0%   { width: 0%; }
      100% { width: 100%; }
    }
    .loading-text {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      margin-top: 12px;
      animation: fadeUp 0.4s 0.6s forwards; opacity: 0;
    }
    .bottom-brand {
      position: absolute;
      bottom: 30px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    .village-chips {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      margin-bottom: 30px; padding: 0 20px;
      animation: fadeUp 0.5s 0.3s forwards; opacity: 0;
    }
    .vchip {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="bg-pattern">
  🌾🐟🔧🚗🍽️🐓📚🏗️⚙️🛒🏪🪪🌾🐟🔧🚗🍽️🐓📚🏗️⚙️🛒🏪🪪
</div>

<div class="logo-wrap">
  <div class="logo-icon" id="splashIcon">🌾</div>
  <div class="logo-name" id="splashName">The Part-Timers</div>
  <div class="logo-tagline">Odisha's Rural Services Platform</div>
  <div class="logo-odia">ଓଡ଼ିଶାର ଗ୍ରାମୀଣ ସେବା ମଞ୍ଚ</div>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-n">500+</div><div class="stat-l">Workers — କ.</div></div>
  <div class="stat"><div class="stat-n">12</div><div class="stat-l">Services — ସ.</div></div>
  <div class="stat"><div class="stat-n">30+</div><div class="stat-l">Villages — ଗ.</div></div>
</div>

<div class="village-chips">
  <span class="vchip">📍 Kendrapara</span>
  <span class="vchip">📍 Cuttack</span>
  <span class="vchip">📍 Puri</span>
  <span class="vchip">📍 Balasore</span>
  <span class="vchip">📍 Ganjam</span>
</div>

<div class="progress-bar">
  <div class="progress-fill"></div>
</div>
<div class="loading-text" id="loadingText">Loading... ଲ.</div>

<div class="bottom-brand">Kendrapara, Odisha — India 🇮🇳</div>

<script>
// Loading messages — rural feel
const msgs = [
  'Finding local services... 🌾 | ସ. ସ. ଖ. ।',
  'Loading workers... 👷 | ଶ. ଲ. ।',
  'Getting services ready... ✅ | ସ. ପ. ।',
  'Welcome! ସ୍ୱାଗତ ।'
];
let mi = 0;
const loadEl = document.getElementById('loadingText');
const interval = setInterval(() => {
  mi++;
  if (mi < msgs.length) loadEl.textContent = msgs[mi];
  else clearInterval(interval);
}, 600);

// Check if already visited (don't show splash every time)
const lastSplash = localStorage.getItem('pt_last_splash');
const now = Date.now();
// Show splash max once per 30 minutes
const SPLASH_INTERVAL = 30 * 60 * 1000;
const skipSplash = lastSplash && (now - parseInt(lastSplash)) < SPLASH_INTERVAL;

if (skipSplash) {
  location.replace('index.html');
} else {
  localStorage.setItem('pt_last_splash', now.toString());
  // Auto redirect after 2.8 seconds
  setTimeout(() => {
    document.body.style.transition = 'opacity 0.4s';
    document.body.style.opacity = '0';
    setTimeout(() => location.replace('index.html'), 400);
  }, 2800);
}

// Tap to skip
document.body.addEventListener('click', () => {
  document.body.style.transition = 'opacity 0.25s';
  document.body.style.opacity = '0';
  setTimeout(() => location.replace('index.html'), 250);
});
</script>
</body>
</html>
