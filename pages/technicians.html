<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technicians | The Part-Timers</title>
<link rel="stylesheet" href="../assets/css/shared.css">
</head><body>
<div class="page-wrapper">
  <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="page-header"><a href="../index.html" class="back-btn">←</a><div><div class="header-title">🔧 Technicians</div><div class="header-sub">ଟେକ୍ନିସିଆନ — Electricians, Plumbers, AC Repair & More</div></div></div>
  <div class="search-bar-section"><div class="search-wrap"><input type="text" id="s" placeholder="Electrician, plumber, AC repair..." oninput="render()"><span class="s-icon">🔍</span></div></div>
  <div class="filter-row">
    <div class="chip active" onclick="setC(this,'all')">All</div>
    <div class="chip" onclick="setC(this,'electric')">⚡ Electric</div>
    <div class="chip" onclick="setC(this,'plumber')">🔧 Plumber</div>
    <div class="chip" onclick="setC(this,'ac')">❄️ AC/Fridge</div>
    <div class="chip" onclick="setC(this,'mobile')">📱 Mobile</div>
    <div class="chip" onclick="setC(this,'motor')">⚙️ Motor</div>
  </div>
  <div id="list" style="background:#f8f9fa;padding-top:8px"></div>
  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">Home<br>ଘର</div></a>
    <a href="search.html" class="nav-item"><div class="nav-icon">🔍</div><div class="nav-label">Search<br>ଖୋଜନ୍ତୁ</div></a>
    <a href="orders.html" class="nav-item"><div class="nav-icon">📋</div><div class="nav-label">My Orders<br>ମୋ ଅର୍ଡର</div></a>
    <a href="#" class="nav-item"><div class="nav-icon">💬</div><div class="nav-label">Chat<br>ଚାଟ୍</div></a>
    <a href="profile.html" class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Profile<br>ପ୍ରୋଫାଇଲ</div></a>
  </nav>
</div>
<div id="toast" class="toast"></div>
<script src="../assets/js/data.js"></script>
<script>
const D=[
  {id:'t1',emoji:'⚡',name:'Priya Das',village:'Bhubaneswar',subcat:'Electrician',price:400,unit:'visit',rating:4.9,reviews:203,trust:96,badge:'Top Rated',odia:'ସାର୍ଟ. ଇଲେ. ୨୪/୭।',k:'electric'},
  {id:'t2',emoji:'🔧',name:'Manoj Patel',village:'Cuttack',subcat:'Plumber',price:350,unit:'visit',rating:4.7,reviews:156,trust:88,badge:'Verified',odia:'ପ୍ଲମ୍ବିଂ ସେବା।',k:'plumber'},
  {id:'t3',emoji:'❄️',name:'Ramesh Biswal',village:'Bhubaneswar',subcat:'AC & Refrigerator',price:600,unit:'visit',rating:4.8,reviews:97,trust:91,badge:'Certified',odia:'AC ଓ ଫ୍ରିଜ ମରାମତି।',k:'ac'},
  {id:'t4',emoji:'📱',name:'Deepak Nanda',village:'Kendrapara',subcat:'Mobile Repair',price:200,unit:'visit',rating:4.6,reviews:234,trust:85,badge:'Fast',odia:'ମୋବାଇଲ ମରାମତି।',k:'mobile'},
  {id:'t5',emoji:'⚙️',name:'Sanjib Mohanty',village:'Jagatsinghpur',subcat:'Motor & Pump Repair',price:500,unit:'visit',rating:4.7,reviews:73,trust:87,badge:'Specialist',odia:'ମୋଟର ଓ ପମ୍ପ ମରାମତି।',k:'motor electric'},
  {id:'t6',emoji:'📺',name:'Sunil Pradhan',village:'Puri',subcat:'TV & Electronics',price:300,unit:'visit',rating:4.5,reviews:118,trust:82,badge:'Local',odia:'ଟ୍ୟୁ ଓ ଇଲ. ମରାମତି।',k:'electric'},
  {id:'t7',emoji:'🚰',name:'Tarun Sahoo',village:'Balasore',subcat:'Boring & Pipe Fitting',price:800,unit:'day',rating:4.6,reviews:44,trust:83,badge:'Skilled',odia:'ବୋରିଂ ଓ ପାଇପ ଫିଟ।',k:'plumber'},
];
let ac='all';
function setC(el,c){ac=c;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const q=document.getElementById('s').value.toLowerCase();
  const data=D.filter(d=>(!q||(d.name+d.village+d.subcat+d.k).toLowerCase().includes(q))&&(ac==='all'||d.k.includes(ac)));
  document.getElementById('list').innerHTML=data.map(d=>`<div class="provider-card">
    <div class="pc-image" style="background:linear-gradient(45deg,#E3F2FD,#BBDEFB)">${d.emoji}<div class="pc-badge">${d.badge}</div><div class="pc-verified">✅ ${d.trust}%</div></div>
    <div class="pc-body">
      <div class="pc-name">${d.name}</div><div class="pc-loc">📍 ${d.village} • ${d.subcat}</div>
      <div class="bilingual">${d.odia}</div>
      <div class="pc-meta" style="margin-top:10px"><div class="pc-rating">⭐${d.rating} (${d.reviews})</div><div class="pc-price">₹${d.price}/${d.unit}</div></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-primary" style="flex:1;padding:10px;font-size:13px" onclick="location.href='booking.html?id=${d.id}'">📅 Book Now</button>
        <button style="padding:10px 14px;border:2px solid #4CAF50;border-radius:12px;background:white;color:#4CAF50;cursor:pointer" onclick="showToast('📞 Calling...')">📞</button>
      </div>
    </div></div>`).join('')||`<div class="empty-state"><div class="emoji">🔧</div><h3>No technicians found</h3></div>`;
}
render();
</script></body></html>
