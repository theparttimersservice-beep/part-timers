<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipment Rental | The Part-Timers</title>
<link rel="stylesheet" href="../assets/css/shared.css">
</head><body>
<div class="page-wrapper">
  <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="page-header"><a href="../index.html" class="back-btn">←</a><div><div class="header-title">⚙️ Equipment Rental</div><div class="header-sub">ଯନ୍ତ୍ରପାତି ଭଡ଼ା — Tractors, Machines & Tools</div></div></div>
  <div class="search-bar-section"><div class="search-wrap"><input type="text" id="s" placeholder="Tractor, pump, thresher..." oninput="render()"><span class="s-icon">🔍</span></div></div>
  <div class="filter-row">
    <div class="chip active" onclick="setC(this,'all')">All</div>
    <div class="chip" onclick="setC(this,'tractor')">🚜 Tractor</div>
    <div class="chip" onclick="setC(this,'pump')">💧 Pump</div>
    <div class="chip" onclick="setC(this,'thresher')">🌾 Thresher</div>
    <div class="chip" onclick="setC(this,'excavator')">🏗️ Excavator</div>
  </div>
  <div id="list" style="background:#f8f9fa;padding-top:8px"></div>
  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">Home<br>ଘର</div></a>
    <a href="search.html" class="nav-item"><div class="nav-icon">🔍</div><div class="nav-label">Search<br>ଖୋଜନ୍ତୁ</div></a>
    <a href="orders.html" class="nav-item"><div class="nav-icon">📋</div><div class="nav-label">My Orders<br>ମୋ ଅର୍ଡର</div></a>
    <a href="#" class="nav-item"><div class="nav-icon">💬</div><div class="nav-label">Chat<br>ଚାଟ୍</div></a>
    <a href="profile.html" class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Profile<br>ପ୍ରୋଫାଇଲ</div></a>
  </nav>
</div>
<div id="toast" class="toast"></div>
<script src="../assets/js/data.js"></script>
<script>
const D=[
  {id:'eq1',emoji:'🚜',name:'Mahindra Tractor 35HP',owner:'Rabindra Nayak',village:'Kendrapara',price:800,unit:'hr',rating:4.8,reviews:87,badge:'Most Rented',desc:'Plowing, seeding, harvesting. Multiple implements.',odia:'ଟ୍ରାକ୍ଟର — ଅନେକ ଯନ୍ତ୍ର।',k:'tractor',radius:'10 km'},
  {id:'eq2',emoji:'⚙️',name:'Power Tiller',owner:'Gouranga Sahu',village:'Aul',price:350,unit:'hr',rating:4.6,reviews:54,badge:'Popular',desc:'Compact tiller for small farms and vegetable gardens.',odia:'ଛୋଟ ଜମି ପାଇଁ ଟିଲ.',k:'tractor',radius:'5 km'},
  {id:'eq3',emoji:'🌾',name:'Paddy Threshing Machine',owner:'Suresh Behera',village:'Bhubaneswar',price:600,unit:'day',rating:4.7,reviews:43,badge:'High Output',desc:'Electric threshing. 200kg/hr capacity.',odia:'ଧାନ ମଡ଼ାଇ ଯନ୍ତ୍ର।',k:'thresher',radius:'15 km'},
  {id:'eq4',emoji:'💧',name:'Water Pump 3HP',owner:'Dinabandhu Das',village:'Cuttack',price:200,unit:'day',rating:4.5,reviews:76,badge:'Available',desc:'Diesel pump for irrigation. 3HP capacity.',odia:'ଜଳ ସେଚ ପମ୍ପ।',k:'pump',radius:'8 km'},
  {id:'eq5',emoji:'🏗️',name:'Mini Excavator JCB',owner:'Rohit Construction',village:'Bhubaneswar',price:3500,unit:'day',rating:4.9,reviews:32,badge:'Premium',desc:'Pond digging, foundation, land levelling.',odia:'ପୋଖରୀ ଖୋଦ, ଭିତ।',k:'excavator',radius:'30 km'},
  {id:'eq6',emoji:'🔋',name:'Generator 5KVA',owner:'Bijay Power',village:'Balasore',price:400,unit:'day',rating:4.4,reviews:68,badge:'Reliable',desc:'Silent generator for farm and event power backup.',odia:'ଜେନେରେଟର ଭଡ଼ା।',k:'pump',radius:'10 km'},
];
let ac='all';
function setC(el,c){ac=c;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const q=document.getElementById('s').value.toLowerCase();
  const data=D.filter(d=>(!q||(d.name+d.village+d.k).toLowerCase().includes(q))&&(ac==='all'||d.k.includes(ac)));
  document.getElementById('list').innerHTML=data.map(d=>`<div class="provider-card">
    <div class="pc-image" style="background:linear-gradient(45deg,#E0F2F1,#B2DFDB)">${d.emoji}<div class="pc-badge">${d.badge}</div><div class="pc-verified">📏 ${d.radius}</div></div>
    <div class="pc-body">
      <div class="pc-name">${d.name}</div>
      <div class="pc-loc">👤 ${d.owner} • 📍 ${d.village}</div>
      <div style="font-size:12px;color:#555;margin:5px 0">${d.desc}</div>
      <div class="bilingual">${d.odia}</div>
      <div class="pc-meta" style="margin-top:10px"><div class="pc-rating">⭐${d.rating} (${d.reviews})</div><div class="pc-price">₹${d.price}/${d.unit}</div></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-primary" style="flex:1;padding:10px;font-size:13px" onclick="location.href='booking.html?id=${d.id}'">📅 Rent Now • ଭଡ଼ା ନିଅନ୍ତୁ</button>
        <button style="padding:10px 14px;border:2px solid #4CAF50;border-radius:12px;background:white;color:#4CAF50;cursor:pointer" onclick="showToast('📞 Calling owner...')">📞</button>
      </div>
    </div></div>`).join('')||`<div class="empty-state"><div class="emoji">⚙️</div><h3>No equipment found</h3></div>`;
}
render();
</script></body></html>
