<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning & Coaching | The Part-Timers</title>
<link rel="stylesheet" href="../assets/css/shared.css">
</head><body>
<div class="page-wrapper">
  <div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
  <div class="page-header"><a href="../index.html" class="back-btn">←</a><div><div class="header-title">📚 Learning & Coaching</div><div class="header-sub">ଶିକ୍ଷା ଓ ତାଲିମ — Tutors, Music, Dance, Skills</div></div></div>
  <div class="search-bar-section"><div class="search-wrap"><input type="text" id="s" placeholder="Search teachers... | ଶିକ୍ଷକ ଖୋଜନ୍ତୁ" oninput="render()"><span class="s-icon">🔍</span></div></div>
  <div class="filter-row">
    <div class="chip active" onclick="setC(this,'all')">All</div>
    <div class="chip" onclick="setC(this,'academic')">📖 Academic</div>
    <div class="chip" onclick="setC(this,'music')">🎵 Music</div>
    <div class="chip" onclick="setC(this,'dance')">💃 Dance</div>
    <div class="chip" onclick="setC(this,'skill')">🔨 Skill</div>
    <div class="chip" onclick="setC(this,'art')">🎨 Art</div>
  </div>
  <div id="list" style="background:#f8f9fa;padding-top:8px"></div>
  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">Home<br>ଘର</div></a>
    <a href="search.html" class="nav-item"><div class="nav-icon">🔍</div><div class="nav-label">Search<br>ଖୋଜନ୍ତୁ</div></a>
    <a href="orders.html" class="nav-item"><div class="nav-icon">📋</div><div class="nav-label">My Orders<br>ମୋ ଅର୍ଡର</div></a>
    <a href="#" class="nav-item"><div class="nav-icon">💬</div><div class="nav-label">Chat<br>ଚାଟ୍</div></a>
    <a href="profile.html" class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Profile<br>ପ୍ରୋଫାଇଲ</div></a>
  </nav>
</div>
<div id="toast" class="toast"></div>
<script src="../assets/js/data.js"></script>
<script>
const D=[
  {id:'l1',emoji:'📚',name:'Kavita Nanda',village:'Bhubaneswar',subcat:'Math & Science Tutor',price:500,unit:'month',rating:4.9,reviews:189,trust:94,badge:'Top Rated',odia:'ଗଣିତ ଓ ବିଜ୍ଞାନ ଟ୍ୟୁଟର।',k:'academic'},
  {id:'l2',emoji:'🎵',name:'Prakash Dash',village:'Puri',subcat:'Harmonium & Tabla',price:800,unit:'month',rating:4.8,reviews:67,trust:91,badge:'Certified',odia:'ହାରମୋନିୟମ ଓ ତବଲା ଶିକ୍ଷକ।',k:'music'},
  {id:'l3',emoji:'🎹',name:'Smita Panda',village:'Cuttack',subcat:'Keyboard / Organ',price:700,unit:'month',rating:4.7,reviews:45,trust:88,badge:'Trained',odia:'କୀବୋର୍ଡ ଓ ଅର୍ଗାନ ଶିକ୍ଷିକା।',k:'music'},
  {id:'l4',emoji:'💃',name:'Rekha Tripathy',village:'Bhubaneswar',subcat:'Odissi Dance Teacher',price:1200,unit:'month',rating:4.9,reviews:134,trust:96,badge:'Expert',odia:'ଓଡ଼ିଶୀ ନୃତ୍ୟ ଶିକ୍ଷିକା।',k:'dance'},
  {id:'l5',emoji:'🎨',name:'Arun Kumar',village:'Kendrapara',subcat:'Art & Drawing Teacher',price:400,unit:'month',rating:4.6,reviews:52,trust:83,badge:'Creative',odia:'ଚିତ୍ରକଳା ଶିକ୍ଷକ।',k:'art'},
  {id:'l6',emoji:'🔧',name:'Rajan Sahoo',village:'Balasore',subcat:'Computer Skills Trainer',price:600,unit:'month',rating:4.7,reviews:78,trust:87,badge:'Tech',odia:'କ୍ୟୁଅର ଦକ୍ଷତା ତାଲିମ।',k:'skill'},
  {id:'l7',emoji:'📖',name:'Priya Rath',village:'Puri',subcat:'English & Odia Tutor',price:400,unit:'month',rating:4.5,reviews:93,trust:81,badge:'Local',odia:'ଇଂରାଜୀ ଓ ଓଡ଼ିଆ ଟ୍ୟୁଟର।',k:'academic'},
  {id:'l8',emoji:'🌸',name:'Monalisa Devi',village:'Jagatsinghpur',subcat:'Tailoring & Stitching',price:500,unit:'month',rating:4.6,reviews:61,trust:84,badge:'Skill',odia:'ସ୍ୟୁଇଂ ଓ ଟେଲରିଂ ତାଲିମ।',k:'skill'},
];
let ac='all';
function setC(el,c){ac=c;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const q=document.getElementById('s').value.toLowerCase();
  const data=D.filter(d=>(!q||(d.name+d.village+d.subcat+d.k).toLowerCase().includes(q))&&(ac==='all'||d.k.includes(ac)));
  document.getElementById('list').innerHTML=data.map(d=>`<div class="provider-card">
    <div class="pc-image" style="background:linear-gradient(45deg,#E8EAF6,#C5CAE9)">${d.emoji}<div class="pc-badge">${d.badge}</div><div class="pc-verified">✅ ${d.trust}%</div></div>
    <div class="pc-body">
      <div class="pc-name">${d.name}</div><div class="pc-loc">📍 ${d.village} • ${d.subcat}</div>
      <div class="bilingual">${d.odia}</div>
      <div class="pc-meta" style="margin-top:10px"><div class="pc-rating">⭐${d.rating} (${d.reviews})</div><div class="pc-price">₹${d.price}/${d.unit}</div></div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-primary" style="flex:1;padding:10px;font-size:13px" onclick="location.href='booking.html?id=${d.id}'">📅 Enroll Now • ଯୋଗ ଦିଅନ୍ତୁ</button>
        <button style="padding:10px 14px;border:2px solid #4CAF50;border-radius:12px;background:white;color:#4CAF50;cursor:pointer" onclick="showToast('📞 Calling...')">📞</button>
      </div>
    </div></div>`).join('')||`<div class="empty-state"><div class="emoji">📚</div><h3>No teachers found</h3></div>`;
}
render();
</script></body></html>
